services:
  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      HOST: 0.0.0.0
      OPENFLOW_SERVER_MODE: "true"
      REQUIRE_API_TOKEN: "true"
      API_TOKEN: ${API_TOKEN:?Set API_TOKEN before running Docker Compose}
      DEVICE: cuda
      COMPUTE_TYPE: float16
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend/models:/app/models
    gpus: all
