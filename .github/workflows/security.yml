name: Security verification

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# The workflow reads source and package metadata only. Publishing and signing
# are intentionally kept in the protected release process.
permissions:
  contents: read

jobs:
  desktop:
    name: Desktop checks and dependency audit
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - run: npm ci
      - run: npm run check
      # Do not omit dev dependencies: Electron is currently a development
      # dependency but is part of the distributed application.
      - run: npm audit --audit-level=high

  backend:
    name: Backend tests and dependency audit
    runs-on: windows-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements/*.in
      - run: python -m pip install --upgrade pip
      # This remains a transitional, unpinned developer install. The release
      # workflow separately requires generated hash locks.
      - run: python -m pip install -r requirements.txt
      - run: python -m pip install pip-audit
      - run: python -m pip check
      - run: python -m pytest -q
      - run: python -m pip_audit -r requirements.txt
